<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Local Farmer Market - Login</title>
  <link rel="stylesheet" href="/public/styles.css" />
  <script defer src="/public/main.js"></script>
  <style>.center{max-width:420px;margin:40px auto}</style>
  <meta name="theme-color" content="#2e7d32"/>
</head>
<body>
  <div class="header">
    <div class="container">
      <h1>Local Farmer Market</h1>
      <div>Eco-friendly, community-driven marketplace</div>
    </div>
  </div>
  <div class="container center">
    <div class="card">
      <h2>Sign in</h2>
      <form id="loginForm">
        <div>
          <label>Username</label>
          <input name="username" placeholder="farmer1 or customer1" required />
        </div>
        <div>
          <label>Password</label>
          <input name="password" type="password" placeholder="password123" required />
        </div>
        <button class="btn" type="submit">Login</button>
      </form>
      <p class="tag">Default users are seeded on server start</p>
      <div id="msg" class="tag" style="display:none"></div>
    </div>
  </div>
  <div class="footer">Grow local. Buy fresh.</div>
  <script>
    window.addEventListener('DOMContentLoaded', () => {
      const form = document.getElementById('loginForm');
      form.addEventListener('submit', async (e) => {
        e.preventDefault();
        const fd = new FormData(form);
        const payload = Object.fromEntries(fd.entries());
        try {
          await FM.api('/api/login', { method: 'POST', body: JSON.stringify(payload) });
          location.href = '/home';
        } catch (err) {
          const msg = document.getElementById('msg');
          msg.textContent = err.message || 'Login failed';
          msg.style.display = 'inline-block';
        }
      });
    });
  </script>
</body>
</html>
